name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run tests
        run: pytest
        working-directory: backend
